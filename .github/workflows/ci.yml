name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy -p kiwisolver-rust-python --no-deps -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Python tools
        run: python -m pip install --upgrade pip maturin pytest

      - name: Install package for Python tests
        run: python -m pip install --no-deps .

      - name: Run Rust tests
        run: cargo test -p kiwisolver-rust-python

      - name: Run Python compatibility checks
        run: python tests/run_python_compat.py

      - name: Run Python tests
        run: python -m pytest tests/python -v

  wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.10"
            maturin-interpreter: python3.10
            build-sdist: false
          - os: ubuntu-latest
            python-version: "3.11"
            maturin-interpreter: python3.11
            build-sdist: false
          - os: ubuntu-latest
            python-version: "3.12"
            maturin-interpreter: python3.12
            build-sdist: true
          - os: macos-latest
            python-version: "3.10"
            maturin-interpreter: python3.10
            build-sdist: false
          - os: macos-latest
            python-version: "3.11"
            maturin-interpreter: python3.11
            build-sdist: false
          - os: macos-latest
            python-version: "3.12"
            maturin-interpreter: python3.12
            build-sdist: false
          - os: windows-latest
            python-version: "3.10"
            maturin-interpreter: python
            build-sdist: false
          - os: windows-latest
            python-version: "3.11"
            maturin-interpreter: python
            build-sdist: false
          - os: windows-latest
            python-version: "3.12"
            maturin-interpreter: python
            build-sdist: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheels
        if: ${{ !matrix.build-sdist }}
        uses: PyO3/maturin-action@v1
        with:
          command: build
          rust-toolchain: stable
          args: --release -i ${{ matrix.maturin-interpreter }} --out dist

      - name: Build wheels and sdist
        if: ${{ matrix.build-sdist }}
        uses: PyO3/maturin-action@v1
        with:
          command: build
          rust-toolchain: stable
          args: --release -i ${{ matrix.maturin-interpreter }} --sdist --out dist

      - name: Smoke test wheel
        run: |
          python -c "from pathlib import Path; import subprocess, sys; wheel = sorted(Path('dist').glob('*.whl'))[0]; subprocess.check_call([sys.executable, '-m', 'pip', 'install', '--force-reinstall', '--no-deps', str(wheel)])"
          python -c "import kiwisolver; import kiwisolver._kiwisolver_native"

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist
